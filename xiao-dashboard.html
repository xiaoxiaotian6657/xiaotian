<!doctype html>
<html lang="zh-CN"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>肖田宣发看板</title><script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script><script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<style>body{margin:0;padding:20px;font-family:"Segoe UI","Microsoft YaHei";background:#f5f7ff;color:#172036}.c{max-width:1200px;margin:0 auto}.h{background:linear-gradient(120deg,#3f5efb,#7c3aed);color:#fff;padding:18px;border-radius:14px}.b{border:1px solid #e5e7eb;background:#fff;border-radius:12px;padding:12px;margin-top:12px}.row{display:grid;gap:10px;grid-template-columns:1fr auto auto}.btn,input,select{padding:10px;border-radius:8px;border:1px solid #e5e7eb}.btn{border:none;background:#4f46e5;color:#fff}.k{display:grid;grid-template-columns:repeat(6,minmax(120px,1fr));gap:10px}.kp{border:1px solid #e5e7eb;border-radius:10px;padding:10px}.l{color:#6b7280;font-size:12px}.v{font-size:22px;font-weight:700}.chart{height:300px}table{width:100%;border-collapse:collapse}th,td{border:1px solid #e5e7eb;padding:8px;text-align:center}.up{color:#16a34a}.down{color:#dc2626}</style></head>
<body><div class="c"><div class="h"><h2>肖田宣发看板</h2></div>
<div class="b row"><button id="syncBtn" class="btn">同步Google</button></div>
<div class="b"><div id="syncStatus" class="l">同步状态：未同步</div><div class="row" style="grid-template-columns:1fr"><select id="platformFilter"></select></div></div>
<div class="b k" id="kpis"></div><div class="b"><h3>近30天趋势（发布量/播放量）</h3><div class="chart"><canvas id="trendChart"></canvas></div></div><div class="b"><h3>平台明细（昨日）</h3><table id="platformTable"></table></div></div>
<script>
const P=["Twitter","YouTube","TikTok","Instagram","Facebook"],SID="1A9dGBJ9r9ISz4ClrCkFh35jGuUHrwo44-680yE06UFM",GID="1029570541";let rows=[],chart=null;
const f=n=>Number(n||0).toLocaleString("zh-CN"),n=v=>{const x=Number(String(v??"").replace(/,/g,"").trim());return Number.isFinite(x)?x:0};
const nh=k=>String(k||"").trim().toLowerCase().replace(/[\s_()\-:：]/g,""),pick=(r,ks)=>Object.keys(r).find(k=>ks.includes(nh(k)))?r[Object.keys(r).find(k=>ks.includes(nh(k))) ]:"",dkey=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
function pd(v){const s=String(v||"").trim().replace(/[.]/g,"-").replace(/\//g,"-");if(/^\d{1,2}-\d{1,2}$/.test(s)){const [m,d]=s.split("-").map(Number);return new Date(new Date().getFullYear(),m-1,d)}const m=s.match(/Date\((\d+),\s*(\d+),\s*(\d+)\)/i);if(m)return new Date(+m[1],+m[2],+m[3]);const d=new Date(s);return Number.isNaN(d.getTime())?new Date():d}
function plat(x){const s=String(x||"").toLowerCase();if(s.includes("twitter")||s.includes("推特")||s==="x")return"Twitter";if(s.includes("youtube")||s.includes("yt"))return"YouTube";if(s.includes("tiktok"))return"TikTok";if(s.includes("instagram")||s.includes("ins"))return"Instagram";if(s.includes("facebook")||s.includes("fb"))return"Facebook";return""}
function parse(raw){return raw.map(r=>({date:pick(r,["宣发时间","日期","发布时间","date","publishdate"])||r.col_1,platform:plat(pick(r,["宣发平台","平台","platform","channel"])||r.col_2),account:String(pick(r,["账号","账号名称","account","accountname"])||r.col_8||"未知账号").trim(),views:n(pick(r,["最新浏览量","浏览量","播放量","views"])||r.col_9),likes:n(pick(r,["最新评论量/点赞","点赞量","点赞","likes"])||r.col_10)})).filter(r=>r.platform&&P.includes(r.platform))}
function wkeys(){const t=new Date(),e=new Date(t.getFullYear(),t.getMonth(),t.getDate()),s=new Date(e);s.setDate(e.getDate()-29);const a=[];for(let d=new Date(s);d<=e;d.setDate(d.getDate()+1))a.push(dkey(d));return a}
function win(rs){const ks=new Set(wkeys());return rs.filter(r=>ks.has(dkey(pd(r.date))))}
function opt(){const ws=win(rows),p=[...new Set(ws.map(r=>r.platform))];platformFilter.innerHTML=`<option value="ALL">全部平台</option>${p.map(x=>`<option>${x}</option>`).join("")}`}
function fil(){const p=platformFilter.value||"ALL";return win(rows).filter(r=>(p==="ALL"||r.platform===p))}
function render(){const rs=fil(),ks=wkeys(),yd=ks.at(-2)||ks.at(-1),map={};P.forEach(p=>map[p]={posts:0,views:0,likes:0});const byDay={};ks.forEach(k=>byDay[k]={posts:0,views:0});rs.forEach(r=>{const k=dkey(pd(r.date));if(byDay[k]){byDay[k].posts++;byDay[k].views+=r.views}if(k===yd&&map[r.platform]){map[r.platform].posts++;map[r.platform].views+=r.views;map[r.platform].likes+=r.likes}});
const tp=rs.length,tv=rs.reduce((s,x)=>s+x.views,0),tl=rs.reduce((s,x)=>s+x.likes,0),av=tp?Math.round(tv/tp):0;kpis.innerHTML=[["近30天发布数",f(tp)],["近30天总播放",f(tv)],["近30天总点赞",f(tl)],["条均播放",f(av)],["昨日发布数",f(Object.values(map).reduce((s,x)=>s+x.posts,0))],["昨日总点赞",f(Object.values(map).reduce((s,x)=>s+x.likes,0))]].map(x=>`<div class="kp"><div class="l">${x[0]}</div><div class="v">${x[1]}</div></div>`).join("");
if(chart)chart.destroy();chart=new Chart(document.getElementById("trendChart"),{type:"bar",data:{labels:ks.map(k=>k.slice(5)),datasets:[{label:"发布量",data:ks.map(k=>byDay[k].posts),backgroundColor:"#7c3aed",yAxisID:"yPosts"},{label:"播放量",type:"line",data:ks.map(k=>byDay[k].views),borderColor:"#4f46e5",backgroundColor:"#4f46e5",pointRadius:3,pointHoverRadius:5,tension:0.2,yAxisID:"yViews"}]},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:"index",intersect:false},scales:{yPosts:{type:"linear",position:"left",title:{display:true,text:"发布量"}},yViews:{type:"linear",position:"right",grid:{drawOnChartArea:false},title:{display:true,text:"播放量"}}},plugins:{tooltip:{callbacks:{label:(ctx)=>`${ctx.dataset.label}: ${f(ctx.raw)}`}}}}});
platformTable.innerHTML=`<tr><th>平台</th><th>发布数</th><th>播放量</th><th>点赞量</th><th>点赞率(点赞/播放)</th></tr>${P.filter(p=>p!=="TikTok"&&p!=="YouTube").map(p=>`<tr><td>${p}</td><td>${map[p].posts}</td><td>${f(map[p].views)}</td><td>${f(map[p].likes)}</td><td class="${map[p].views? "up":"down"}">${map[p].views?((map[p].likes/map[p].views)*100).toFixed(2):"0.00"}%</td></tr>`).join("")}`}
function gobj(o){const cs=o.table?.cols||[],rs=o.table?.rows||[],hs=cs.map(c=>(c?.label||c?.id||""));return rs.map(r=>{const x={};hs.forEach((h,i)=>{const c=r?.c?.[i];x[h||`col_${i}`]=c?((c.f!==undefined)?c.f:(c.v??"")):""});return x})}
async function sync(){syncStatus.textContent="同步状态：同步中...";try{const data=await new Promise((res,rej)=>{const cb="xiao_cb_"+Date.now(),s=document.createElement("script"),t=setTimeout(()=>{cl();rej(new Error("超时"))},12000);function cl(){clearTimeout(t);try{delete window[cb]}catch(e){window[cb]=undefined}if(s.parentNode)s.parentNode.removeChild(s)}window[cb]=(o)=>{cl();res(gobj(o||{}))};s.onerror=()=>{cl();rej(new Error("加载失败"))};s.src=`https://docs.google.com/spreadsheets/d/${SID}/gviz/tq?gid=${GID}&tqx=responseHandler:${cb}`;document.body.appendChild(s)});
rows=parse(data);opt();render();syncStatus.textContent=`同步状态：成功，共 ${rows.length} 条`;syncStatus.style.color="#059669"}catch(e){syncStatus.textContent=`同步状态：失败(${e.message})`;syncStatus.style.color="#dc2626"}}
function mock(){const t=new Date(),a=[];for(let i=29;i>=0;i--){const d=new Date(t);d.setDate(t.getDate()-i);const md=`${d.getMonth()+1}-${d.getDate()}`;P.forEach((p,ix)=>{const c=(i+ix)%2?1:2;for(let j=0;j<c;j++)a.push({date:md,platform:p,account:`${p}_acc`,views:Math.round(120*(ix+1)*(1+Math.sin((i+j)/5))),likes:Math.round(16*(ix+1)*(1+Math.cos((i+j)/6)))})})}rows=a;opt();render();syncStatus.textContent="同步状态：已加载假数据"}
syncBtn.addEventListener("click",sync);platformFilter.addEventListener("change",render);mock();sync();
</script></body></html>
